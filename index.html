<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Directorio de Responsables por Proyecto" />
    <meta name="theme-color" content="#3b82f6" />

    <title>Directorio de Responsables</title>

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/responsive.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <div class="header-wrapper">
        <div class="header-logo">
          <span>📊</span>
          <span class="header-title">Directorio de Responsables</span>
        </div>
      </div>

      <div class="search-container">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Buscar por nombre, correo o teléfono..."
          aria-label="Buscar responsables"
        />
        <select
          id="filter-proyecto"
          class="filter-select"
          aria-label="Filtrar por proyecto"
        >
          <option value="">Proyecto</option>
        </select>
        <select
          id="filter-cargo"
          class="filter-select"
          aria-label="Filtrar por cargo"
        >
          <option value="">Cargo</option>
        </select>
        <select
          id="filter-estado"
          class="filter-select"
          aria-label="Filtrar por estado"
        >
          <option value="">Estado</option>
        </select>
      </div>
    </header>

    <main class="container">
      <!-- Indicators -->
      <section class="indicators-grid">
        <div class="indicator-card">
          <span class="indicator-label">Total Responsables</span>
          <span class="indicator-value" id="indicator-total-responsables">0</span>
        </div>
        <div class="indicator-card">
          <span class="indicator-label">Proyectos</span>
          <span class="indicator-value" id="indicator-total-proyectos">0</span>
        </div>
        <div class="indicator-card">
          <span class="indicator-label">Cargos</span>
          <span class="indicator-value" id="indicator-total-cargos">0</span>
        </div>
        <div class="indicator-card">
          <span class="indicator-label">Activos</span>
          <span class="indicator-value" id="indicator-activos-responsables"
            >0</span
          >
        </div>
      </section>

      <!-- Cards Grid -->
      <section class="cards-container">
        <div class="cards-grid" id="cards-container"></div>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
